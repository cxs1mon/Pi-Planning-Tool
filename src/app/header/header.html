<section class="header">
  <h1 class="header__title header__title--{{ themeColor() }}">PI Planungstool</h1>
  @if (piName() && themeColor() === 'blue') {
    <p class="header__pi-name">{{ piName() }}</p>
  }
  <button (click)="navigate()" class="header__logo-button">
    <img
      ngSrc="./Logo_{{ themeColor() }}.png"
      alt="{{ themeColor() }} Logo"
      height="497"
      width="1280"
      class="header__logo header__logo--{{ themeColor() }}"
      priority
    />
  </button>
</section>
@if (themeColor() === 'blue') {
  <hr class="header__horizontal-line" />
}
